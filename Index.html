<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>E-mail verificado</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #121826, #1e293b);
      color: white;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 35px 25px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(12px);
      animation: aparecer 0.5s ease;
    }

    .icon {
      width: 86px;
      height: 86px;
      margin: 0 auto 22px;
      border-radius: 50%;
      background: #22c55e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: bold;
      box-shadow: 0 0 30px rgba(34, 197, 94, 0.45);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
      color: #dbeafe;
      margin-bottom: 25px;
    }

    .button {
      display: inline-block;
      text-decoration: none;
      color: white;
      background: #2563eb;
      padding: 13px 22px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    .button:hover {
      background: #1d4ed8;
      transform: translateY(-2px);
    }

    .small-text {
      margin-top: 22px;
      font-size: 13px;
      color: #94a3b8;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="icon">✓</div>

    <h1>E-mail verificado!</h1>

    <p>
      Obrigado por confirmar seu e-mail e concluir seu registro.
      Sua conta foi verificada com sucesso.
    </p>

    <button class="button" onclick="window.close()">Fechar página</button>

    <div class="small-text">
      Agora você já pode acessar sua conta normalmente.
    </div>
  </main>
</body>
</html>
